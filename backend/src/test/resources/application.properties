spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# GitHub Login
spring.security.oauth2.client.registration.github.client-id=${GITHUBCLIENTID:dummy_github_client_id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUBCLIENTSECRET:dummy_github_client_secret}

# Google Login
spring.security.oauth2.client.registration.google.client-id=${GOOGLECLIENTID:dummy_google_client_id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLECLIENTSECRET:dummy_google_client_secret}

# JWT Secret key
app.jwt.secret=${JWT_SECRET:en_superhemlig_default_nyckel_som_ar_minst_32_tecken_lang}

logging.level.org.springframework.security=TRACE
